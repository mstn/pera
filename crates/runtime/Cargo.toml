[package]
name = "pera-runtime"
version.workspace = true
edition.workspace = true

[features]
default = []
monty = ["dep:monty"]

[dependencies]
async-trait = "0.1"
pera-canonical = { path = "../canonical" }
pera-core = { path = "../core" }
monty = { git = "https://github.com/pydantic/monty", package = "monty", optional = true }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
serde_yaml = "0.9"
tokio = { version = "1.48.0", features = ["macros", "rt-multi-thread", "sync"] }

[lib]
path = "src/lib.rs"
