schema_version: 1

skill:
  name: ui
  version: 0.1.0
  description: Build renderer-agnostic UIs from a typed design-system catalog.

defaults:
  instructions:
    source: SKILL.md

profiles:
  - name: ui-default
    default: true
    runtime:
      kind: wasm-component
      wasm:
        wit:
          path: world.wit
          world: ui-default
        artifacts:
          dir: build/ui-default
        build:
          tool: componentize-py
          module: app
    capabilities:
      - ui
