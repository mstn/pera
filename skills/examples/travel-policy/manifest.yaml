schema_version: 1

skill:
  name: travel-policy
  version: 0.1.0
  description: Inspect travel policy rules such as approvals and room-sharing constraints.

defaults:
  instructions:
    source: SKILL.md
  databases:
    - name: main
      engine: sqlite
      migrations:
        dir: db/schema
        table: schema_migrations
      seeds:
        dir: db/seeds
        default: baseline_feasible
      on_load: migrate

profiles:
  - name: baseline-feasible
    default: true
    runtime:
      kind: wasm-component
      wasm:
        wit:
          path: world.wit
          world: travel-policy-default
        artifacts:
          dir: build/baseline-feasible
        build:
          tool: componentize-py
          module: app
    capabilities:
      - sqlite
  - name: shared-room-required
    runtime:
      kind: wasm-component
      wasm:
        wit:
          path: world.wit
          world: travel-policy-default
        artifacts:
          dir: build/shared-room-required
        build:
          tool: componentize-py
          module: app
    capabilities:
      - sqlite
    databases:
      - name: main
        engine: sqlite
        migrations:
          dir: db/schema
          table: schema_migrations
        seeds:
          dir: db/seeds
          default: shared_room_required
        on_load: migrate
