schema_version: 1
id: business-trip-planning.shared-room-required
description: Evaluate whether the agent can combine schedule, travel, and policy skills to infer that a shared double room is a valid fallback.

runtime:
  output_folder: .pera
  skill_sources:
    - id: local_examples
      path: skills/examples
  catalog:
    - skill: calendar-ops
      source: local_examples
      profile: shared-room-required
    - skill: travel-desk
      source: local_examples
      profile: shared-room-required
    - skill: travel-policy
      source: local_examples
      profile: shared-room-required
  active_skills: []

scenario:
  purpose: |
    Evaluate whether the agent can compose schedule, transport, lodging, and policy data across multiple code turns and infer that sharing a double room is a valid alternative when no single rooms are available.
  user_profile:
    task: |
      Plan a trip for Alice and Bruno to attend the Delta review in Berlin next week. Find a feasible option and explain any tradeoffs.
    reason: |
      Travel needs to be booked today and the user wants a policy-compliant recommendation.
    known_info: |
      Both travelers must attend the Delta review in Berlin. The trip should follow company travel policy. The cost center is DELTA-EU. The relevant planning week starts on 2026-04-06.
    unknown_info: |
      The user does not know which transport and lodging options are available, whether room sharing is needed, or whether approval is required.
  interaction_modes:
    scripted:
      kind: scripted
      initial_message: |
        Plan Berlin travel for Alice and Bruno for the Delta review next week.
    simulated:
      kind: simulated
  agent_profile:
    persona: Helpful operations assistant.
  history: []

evaluation:
  criteria:
    - type: action_sequence
      ordered: false
      actions:
        - action: load_skill
          arguments:
            skill_name: calendar-ops
        - action: load_skill
          arguments:
            skill_name: travel-desk
        - action: load_skill
          arguments:
            skill_name: travel-policy
        - action: execute_code
          arguments:
            language: python
      allow_extra_actions: true
    - type: action_count
      action: execute_code
      min_count: 2
    - type: llm_judge
      rubric: |
        Determine whether the agent actually solved the user's task.

        Pass only if the evidence shows that the agent reached a supported recommendation for the trip and correctly recognized that a shared double room is an acceptable fallback when no single rooms are available and policy allows sharing.

        A full pass should normally require a complete recommendation covering both transport and lodging for the trip, including return travel if return options exist in the system.

        If the system evidence shows that no feasible return options are available, the agent may still pass only if it clearly states that limitation, presents the outbound-plus-lodging recommendation as the best feasible partial result, and still gets the shared-room fallback right.

        Fail if the agent stops at partial progress, only proposes next steps, leaves the return leg unresolved without clearly establishing that the system lacks viable return options, or misses the shared-room fallback.
    - type: final_message_required
    - type: forbid_finish_reason
      finish_reason: failed_action_limit_exceeded

optimization:
  targets:
    - kind: prompt
      prompt: base_system
    - kind: prompt
      prompt: skills_system
    - kind: prompt
      skill: calendar-ops
      field: instructions
    - kind: prompt
      skill: calendar-ops
      field: when_to_use
    - kind: prompt
      skill: travel-desk
      field: instructions
    - kind: prompt
      skill: travel-desk
      field: when_to_use
    - kind: prompt
      skill: travel-policy
      field: instructions
    - kind: prompt
      skill: travel-policy
      field: when_to_use
  max_epochs: 5
  early_stop_on_pass: true
